<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUJAL | SX⁷ - ADVANCED CONTROL</title>
    <style>
        body { background:#0a0e14; color:#00ff88; font-family:'Courier New', monospace; margin:0; padding:0; }
        .header { text-align:center; padding:20px; background:#161b22; font-size:28px; border-bottom:3px solid #00ff88; }
        .tabs { display:flex; background:#161b22; }
        .tab { padding:15px 20px; cursor:pointer; flex:1; text-align:center; }
        .tab.active { background:#0f1419; border-bottom:3px solid #00ff88; }
        .content { padding:20px; display:none; }
        .content.active { display:block; }
        .panel { background:#161b22; border:1px solid #00ff88; padding:15px; margin:10px 0; border-radius:6px; }
        input, textarea { width:100%; padding:10px; margin:8px 0; background:#0a0e14; color:#00ff88; border:1px solid #00ff88; }
        button { width:100%; padding:12px; margin:8px 0; background:#00ff88; color:black; font-weight:bold; border:none; cursor:pointer; }
        button:hover { background:#00cc6a; }
        
        /* Redesigned Console */
        .console {
            height: 52vh;
            background: #000000;
            border: 2px solid #00ff88;
            padding: 15px;
            overflow-y: auto;
            font-size: 15px;
            line-height: 1.6;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.3);
        }
        .log-line {
            margin: 3px 0;
            white-space: pre-wrap;
        }
        .log-success { color: #00ff88; }
        .log-error { color: #ff3366; }
        .log-info { color: #00ccff; }
        .timestamp { color: #666; font-size: 13px; margin-right: 8px; }
    </style>
</head>
<body>
    <div class="header">✦ SUJAL | SX⁷ - ADVANCED SINGLE ACCOUNT ✦</div>
    
    <div class="tabs">
        <div class="tab active" onclick="switchTab(0)">Dashboard</div>
        <div class="tab" onclick="switchTab(1)">Messages</div>
        <div class="tab" onclick="switchTab(2)">Name Change</div>
        <div class="tab" onclick="switchTab(3)">Session Login</div>
    </div>

    <!-- Dashboard -->
    <div class="content active" id="tab0">
        <div class="panel">
            <h2>🚀 STATUS</h2>
            <div id="status" style="padding:12px; background:#1a2a1f; font-size:18px;">Stopped</div>
            <button onclick="startBot()">▶ START BOT</button>
            <button onclick="stopBot()">⛔ STOP BOT</button>
        </div>
        <div class="panel">
            <h2>📜 LIVE CONSOLE</h2>
            <div class="console" id="liveLogs"></div>
        </div>
    </div>

    <!-- Messages -->
    <div class="content" id="tab1">
        <div class="panel">
            <h2>📨 Messages (Comma Separated)</h2>
            <textarea id="messages" rows="10" placeholder="Messages comma se alag karke daalo..."></textarea>
        </div>
    </div>

    <!-- Name Change + Delays -->
    <div class="content" id="tab2">
        <div class="panel">
            <h2>💠 Name Change Titles (One Per Line)</h2>
            <textarea id="nc_titles" rows="8"></textarea>
            
            <h3>⏱️ Delay Settings</h3>
            <input type="number" id="msg_delay" value="25" placeholder="Message Delay (seconds)">
            <input type="number" id="nc_delay" value="8" placeholder="Name Change Delay (seconds)">
        </div>
    </div>

    <!-- Session Login -->
    <div class="content" id="tab3">
        <div class="panel">
            <h2>🔑 Session Login (Session ID se)</h2>
            <input type="text" id="sessionid" placeholder="sessionid = xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx">
            <input type="text" id="ds_user_id" placeholder="ds_user_id = 1234567890123456789 (optional)">
            <input type="text" id="thread_id" placeholder="Thread ID = 117390744240357">
            <button onclick="startWithSession()">🔑 LOGIN & START BOT</button>
        </div>
    </div>

    <script>
        function switchTab(n) {
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            document.getElementById('tab'+n).classList.add('active');
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab')[n].classList.add('active');
        }

        async function startWithSession() {
            const data = {
                sessionid: document.getElementById('sessionid').value.trim(),
                ds_user_id: document.getElementById('ds_user_id').value.trim(),
                thread_id: document.getElementById('thread_id').value.trim(),
                messages: document.getElementById('messages').value,
                nc_titles: document.getElementById('nc_titles').value,
                msg_delay: document.getElementById('msg_delay').value,
                nc_delay: document.getElementById('nc_delay').value
            };
            await fetch('/start', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
        }

        async function stopBot() {
            await fetch('/stop');
        }

        // Continuous Console Update with better design
        setInterval(async () => {
            const res = await fetch('/logs');
            const text = await res.text();
            const consoleDiv = document.getElementById('liveLogs');
            consoleDiv.innerHTML = text;
            consoleDiv.scrollTop = consoleDiv.scrollHeight;  // Auto scroll
        }, 800);  // Har 0.8 second mein update
    </script>
</body>
</html>
