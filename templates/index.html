<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUJAL | SX⁷ - ADVANCED CONTROL</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background:#0a0e14; color:#00ff88; font-family:'Courier New', monospace; }
        .header { background:#161b22; padding:25px; text-align:center; border-bottom:3px solid #00ff88; font-size:28px; }
        .card { background:rgba(0,255,0,0.08); border:2px solid #00ff88; border-radius:12px; }
        input, textarea { background:#111; color:#00ff88; border:1px solid #00ff88; }
        .console { 
            height: 460px; 
            background:#000; 
            border:2px solid #00ff88; 
            padding:15px; 
            overflow-y:auto; 
            font-size:14.5px; 
            line-height:1.5;
        }
        .btn-start { background:#00ff88; color:#000; font-weight:bold; }
        .btn-stop { background:#ff3366; color:white; font-weight:bold; }
        .status-running { color:#0f0; animation: blink 1.2s infinite; }
        @keyframes blink { 50% { opacity: 0.4; } }
    </style>
</head>
<body>
<div class="container py-4">
    <div class="header">
        ✦ SUJAL | SX⁷ - ADVANCED SINGLE ACCOUNT ✦
    </div>

    <div class="row mt-4">
        <div class="col-lg-7">
            <div class="card p-4 mb-4">
                <h4 class="mb-3 text-center">⚙️ CONFIGURATION</h4>
                <form id="form">
                    <div class="mb-3">
                        <label class="form-label">Session ID</label>
                        <textarea name="sessionid" class="form-control" rows="2" placeholder="sessionid paste karo" required></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Thread ID (Specific Group Chat)</label>
                        <input name="thread_id" type="text" class="form-control" placeholder="117390744240357" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Messages (1 per line)</label>
                        <textarea name="messages" class="form-control" rows="6" placeholder="Message 1\nMessage 2" required></textarea>
                    </div>
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label">Message Delay (sec)</label>
                            <input name="delay" type="number" step="0.1" class="form-control" value="25">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">NC Delay (sec)</label>
                            <input name="nc_delay" type="number" class="form-control" value="8">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Group Name Base</label>
                            <input name="group_name" type="text" class="form-control" placeholder="SUJAL BAAP">
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <div class="col-lg-5">
            <div class="card p-4">
                <h4 class="mb-3 text-center">📊 STATUS</h4>
                <div class="text-center mb-4">
                    <span id="status" class="badge fs-3 px-5 py-3">STOPPED</span>
                </div>
                <div class="d-grid gap-2">
                    <button onclick="startBomb()" class="btn btn-start btn-lg">▶ START BOT</button>
                    <button onclick="stopBomb()" class="btn btn-stop btn-lg">⛔ STOP BOT</button>
                </div>
                <div class="mt-4 text-center">
                    <small>Sent: <span id="sent" class="fw-bold">0</span> | Uptime: <span id="uptime">00:00:00</span></small>
                </div>
            </div>
        </div>
    </div>

    <div class="card mt-4 p-4">
        <h4 class="mb-3 text-center">📜 LIVE CONSOLE</h4>
        <div id="console" class="console"></div>
    </div>
</div>

<script>
function updateStatus() {
    fetch("/status")
        .then(r => r.json())
        .then(d => {
            document.getElementById("sent").innerText = d.sent;
            document.getElementById("uptime").innerText = d.uptime;
            
            const statusEl = document.getElementById("status");
            if (d.running) {
                statusEl.innerText = "RUNNING";
                statusEl.className = "badge bg-danger fs-3 px-5 py-3 status-running";
            } else {
                statusEl.innerText = "STOPPED";
                statusEl.className = "badge bg-secondary fs-3 px-5 py-3";
            }

            const consoleDiv = document.getElementById("console");
            consoleDiv.innerHTML = d.logs.map(l => `<div>${l}</div>`).join("");
            consoleDiv.scrollTop = consoleDiv.scrollHeight;
        });
}

function startBomb() {
    const form = document.getElementById("form");
    const formData = new FormData(form);
    
    fetch("/start", { method: "POST", body: formData })
        .then(() => updateStatus());
}

function stopBomb() {
    fetch("/stop", { method: "POST" })
        .then(() => updateStatus());
}

// Auto update
setInterval(updateStatus, 1500);
updateStatus();
</script>
</body>
</html>
